version: "3.9"

services:
  api:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__Postgres=${POSTGRES_CONNECTION}
      - Redis__Connection=${REDIS_CONNECTION}
      - S3__Endpoint=${S3_ENDPOINT}
      - S3__AccessKey=${S3_ACCESS_KEY}
      - S3__SecretKey=${S3_SECRET_KEY}
      - Jwt__Secret=${JWT_SECRET}
      - Jwt__Issuer=releaselab
      - Jwt__Audience=releaselab
      - Stripe__SecretKey=${STRIPE_SECRET_KEY}
      - Stripe__WebhookSecret=${STRIPE_WEBHOOK_SECRET}
      - Cors__Origins__0=${FRONTEND_URL}
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    restart: always
    depends_on: [postgres, redis, minio]

  worker-mastering:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.worker-mastering
    environment:
      - ConnectionStrings__Postgres=${POSTGRES_CONNECTION}
      - Redis__Connection=${REDIS_CONNECTION}
      - S3__Endpoint=${S3_ENDPOINT}
      - S3__AccessKey=${S3_ACCESS_KEY}
      - S3__SecretKey=${S3_SECRET_KEY}
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
    restart: always
    depends_on: [redis, minio, postgres]

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=releaselab
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes: ["pgdata:/var/lib/postgresql/data"]
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "noeviction"]
    volumes: ["redisdata:/data"]
    restart: always

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${S3_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${S3_SECRET_KEY}
    volumes: ["minio:/data"]
    restart: always

  nginx:
    image: nginx:alpine
    volumes:
      - "../nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro"
      - "certbot-etc:/etc/letsencrypt:ro"
    ports: ["80:80", "443:443"]
    depends_on: [api]
    restart: always

volumes:
  pgdata: {}
  redisdata: {}
  minio: {}
  certbot-etc: {}
