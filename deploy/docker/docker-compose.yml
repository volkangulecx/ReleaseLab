version: "3.9"

services:
  api:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Postgres=Host=postgres;Database=releaselab;Username=rl;Password=rl
      - Redis__Connection=redis:6379
      - S3__Endpoint=http://minio:9000
      - S3__AccessKey=minioadmin
      - S3__SecretKey=minioadmin
      - Jwt__Secret=super-secret-dev-key-change-in-production-min-32-chars!!
      - Jwt__Issuer=releaselab
      - Jwt__Audience=releaselab
      - Stripe__SecretKey=sk_test_placeholder
      - Stripe__WebhookSecret=whsec_placeholder
    depends_on: [postgres, redis, minio]
    ports: ["5000:8080"]

  upload:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.upload
    environment:
      - S3__Endpoint=http://minio:9000
      - S3__AccessKey=minioadmin
      - S3__SecretKey=minioadmin
      - Jwt__Secret=super-secret-dev-key-change-in-production-min-32-chars!!
      - Jwt__Issuer=releaselab
      - Jwt__Audience=releaselab
    depends_on: [minio]
    ports: ["5001:8080"]

  admin:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.admin
    environment:
      - ConnectionStrings__Postgres=Host=postgres;Database=releaselab;Username=rl;Password=rl
      - Jwt__Secret=super-secret-dev-key-change-in-production-min-32-chars!!
      - Jwt__Issuer=releaselab
      - Jwt__Audience=releaselab
    depends_on: [postgres]
    ports: ["5002:8080"]

  worker-mastering:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.worker-mastering
    environment:
      - ConnectionStrings__Postgres=Host=postgres;Database=releaselab;Username=rl;Password=rl
      - Redis__Connection=redis:6379
      - S3__Endpoint=http://minio:9000
      - S3__AccessKey=minioadmin
      - S3__SecretKey=minioadmin
    deploy:
      replicas: 2
    depends_on: [redis, minio, postgres]

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=releaselab
      - POSTGRES_USER=rl
      - POSTGRES_PASSWORD=rl
    volumes: ["pgdata:/var/lib/postgresql/data"]
    ports: ["5432:5432"]

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes: ["redisdata:/data"]
    ports: ["6379:6379"]

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes: ["minio:/data"]

  nginx:
    image: nginx:alpine
    volumes: ["../nginx/nginx.conf:/etc/nginx/nginx.conf:ro"]
    ports: ["80:80"]
    depends_on: [api, upload]

volumes:
  pgdata: {}
  redisdata: {}
  minio: {}
