name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Restore .NET dependencies
        run: dotnet restore ReleaseLab.sln

      - name: Build .NET solution
        run: dotnet build ReleaseLab.sln --configuration Release --no-restore

      - name: Run .NET tests
        run: dotnet test ReleaseLab.sln --configuration Release --no-build --logger "trx;LogFileName=test-results.trx" --logger "console;verbosity=detailed"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/TestResults/*.trx"

      - name: Build Next.js frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Build Docker images (verify only)
        run: |
          docker build -f deploy/docker/Dockerfile.api -t releaselab-api:ci .
          docker build -f deploy/docker/Dockerfile.worker-mastering -t releaselab-worker-mastering:ci .
          docker build -f deploy/docker/Dockerfile.frontend -t releaselab-frontend:ci .
          docker build -f deploy/docker/Dockerfile.admin -t releaselab-admin:ci .
